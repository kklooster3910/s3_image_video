<main class="main">
  @if (isAuthed()) {
    <nav class="cr-nav">
      <div class="cr-nav-brand">
        <span class="cr-nav-logo">&#9654;</span>
        <span class="cr-nav-title">STREAM</span>
      </div>
      <div class="cr-nav-links">
        <a routerLink="/file-list" routerLinkActive="active">Media</a>
        <a routerLink="/upload" routerLinkActive="active">Upload</a>
      </div>
      <button class="cr-nav-logout" (click)="logout()">Sign Out</button>
    </nav>
  }
  <div class="content">
    @if (isAuthed()) {
      <router-outlet />
    } @else {
      <div class="login">
        <app-login />
      </div>
    }
  </div>
</main>
